# /etc/nginx/sites-available/vps-llm
#
# Usage:
#   sudo cp nginx/vps-llm.conf /etc/nginx/sites-available/vps-llm
#   sudo ln -s /etc/nginx/sites-available/vps-llm /etc/nginx/sites-enabled/vps-llm
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates via certbot:
#   sudo certbot --nginx -d api.yourdomain.com

# ── Rate limiting ─────────────────────────────────────────────────────────────
# 30 requests/second per IP; bursting up to 60
limit_req_zone $binary_remote_addr zone=llm_limit:10m rate=30r/s;

upstream vps_llm {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    # ── TLS (filled in by certbot, or set manually) ────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.yourdomain.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "no-referrer"                                  always;

    # ── Request limits ─────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Health endpoint (no rate limit) ───────────────────────────────────
    location = /health {
        proxy_pass         http://vps_llm;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ── OpenAI-compatible API ──────────────────────────────────────────────
    location /v1/ {
        # Apply rate limiting; allow burst of 20 without delay, then queue up to 40
        limit_req zone=llm_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://vps_llm;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";   # enable keepalive to upstream

        # ── SSE / streaming ──────────────────────────────────────────────
        # These are critical — without them nginx buffers the entire stream
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;   # long-running completions
        proxy_send_timeout        300s;
        proxy_connect_timeout     10s;

        # Allow the client to receive chunks immediately
        add_header X-Accel-Buffering "no" always;
    }

    # ── Block everything else ─────────────────────────────────────────────
    location / {
        return 404;
    }
}
